bind_address = "127.0.0.35"
port = 53
insecure_tls = false
upstream_policy = "round_robin"
upstream_race_fanout = 2
prewarm_pools = true

[bootstrap]
servers = ["1.1.1.1", "1.0.0.1"]

[upstreams]
dns = ["1.1.1.1", "1.0.0.1"]
doh = ["https://doh.archuser.org/dns-query", "https://cloudflare-dns.com/dns-query"]
dot = ["tls://doh.archuser.org:853", "tls://cloudflare-dns.com:853"]
doq = ["quic://dns.adguard-dns.com:853", "quic://dns.quad9.net:853"]

[hosts]
"doh.archuser.org" = ["172.233.221.243", "2600:3c06::2000:53ff:fe9a:7714"]
"cloudflare-dns.com" = ["1.1.1.1", "1.0.0.1", "2606:4700:4700::1111", "2606:4700:4700::1001"]

[upstream_refresh]
enabled = true
refresh_threshold = "30s"
min_ttl = "30s"
failure_retry = "30s"
jitter_percent = 20

[cache]
enabled = true
capacity = 2048
default_ttl = "15s"
negative_ttl = "10s"
respect_record_ttl = true

[pools.tls]
size = 16
idle_timeout = "90s"

[pools.quic]
size = 8
idle_timeout = "90s"

[pools.http_transport]
max_idle_conns = 128
max_idle_conns_per_host = 32
idle_conn_timeout = "90s"
tls_handshake_timeout = "5s"

[timeouts]
upstream = "5s"
dial = "2s"
read = "3s"

[rate_limit]
max_in_flight = 1024

[logging]
level = "info"

[metrics]
enabled = true

[health_checks]
enabled = true
interval = "120s"
query = "."
